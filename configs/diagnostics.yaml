tests:
  - test: check_homebrew_installed
    description: Verify Homebrew is installed
    diagnostic: homebrew_installed
    cure: install_homebrew
    severity: critical
    symptom: Cannot install packages via Homebrew
    profiles:
      - basic

  - test: check_homebrew_updated
    description: Verify Homebrew is up to date
    diagnostic: homebrew_updated
    cure: update_homebrew
    severity: warning
    symptom: Homebrew formulae may be outdated
    profiles:
      - basic

  - test: check_vpn_connection
    description: Verify connected to VPN
    diagnostic: vpn_connection
    cure: connect_to_vpn
    severity: info
    symptom: Cannot access internal resources without VPN
    profiles:
      - basic

  - test: check_aws_vault
    description: Verify aws-vault is installed
    diagnostic: aws_vault
    cure: install_aws_vault
    severity: warning
    symptom: Cannot securely manage AWS credentials
    profiles:
      - basic

  - test: check_aws_sso_setup
    description: Verify AWS SSO profiles are configured
    diagnostic: aws_sso_setup
    cure: setup_aws_sso
    severity: warning
    symptom: AWS SSO authentication fails or profiles are missing
    profiles:
      - basic


