  - test: check_docker_installed
    description: Verify Docker is installed
    diagnostic: docker_installed
    cure: install_docker
    severity: critical
    symptom: Cannot run Docker containers
    profiles:
      - infrastructure

  - test: check_docker_running
    description: Verify Docker daemon is running
    diagnostic: docker_running
    cure: start_docker
    severity: info
    symptom: Docker commands fail because daemon is not running
    profiles:
      - infrastructure

  - test: check_docker_compose
    description: Verify docker-compose is installed
    diagnostic: docker_compose
    cure: install_docker_compose
    severity: critical
    symptom: Cannot run multi-container Docker applications
    profiles:
      - infrastructure

  - test: check_opentofu_version
    description: Verify OpenTofu version meets requirements
    diagnostic: opentofu_version
    cure: update_opentofu
    severity: warning
    symptom: OpenTofu commands fail or produce unexpected results
    profiles:
      - infrastructure

  - test: check_python_version
    description: Verify Python version is 3.10.x
    diagnostic: python_version
    cure: update_python
    severity: warning
    symptom: Python scripts may fail or use incompatible features
    profiles:
      - data

  - test: check_wasp_version
    description: Verify Wasp is installed
    diagnostic: wasp_version
    cure: install_wasp
    severity: warning
    symptom: Wasp is used to connect to Redshift
    profiles:
      - data

  - test: check_dbt_analytics_venv_active
    description: Verify bi_analytics_dbt Python venv is active
    diagnostic: dbt_analytics_venv_active
    cure: setup_dbt_venv
    severity: critical
    symptom: start_env.sh and dbt commands will fail - venv must be activated first
    profiles:
      - dbt_analytics

  - test: check_dbt_installed
    description: Verify dbt is installed with the Redshift adapter
    diagnostic: dbt_installed
    cure: install_dbt_redshift
    severity: critical
    symptom: Cannot run any dbt commands against Redshift
    profiles:
      - dbt_analytics

  - test: check_dbt_venv
    description: Verify Python venv exists in bi_analytics_dbt project
    diagnostic: dbt_venv
    cure: setup_dbt_venv
    severity: critical
    symptom: start_env.sh fails - venv/bin/activate not found
    profiles:
      - dbt_analytics

  - test: check_dbt_secret_config
    description: Verify secret_config.env exists with Redshift credentials configured
    diagnostic: dbt_secret_config
    cure: setup_dbt_secret_config
    severity: critical
    symptom: dbt cannot connect to Redshift - credentials missing or unconfigured
    profiles:
      - dbt_analytics

  - test: check_dbt_packages
    description: Verify dbt packages are installed (dbt deps has been run)
    diagnostic: dbt_packages
    cure: run_dbt_deps
    severity: warning
    symptom: dbt compile fails - packages like dbt_utils and dbt_expectations are missing
    profiles:
      - dbt_analytics

  - test: check_claude
    description: Verify Claude CLI is installed
    diagnostic: claude_cli
    cure: install_claude_cli
    severity: warning
    symptom: Cannot use Claude CLI commands
    profiles:
      - basic
